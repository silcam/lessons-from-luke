name: Build and Test

on:
  push:
    branches: [master, 'feature/*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [12, 20]
    continue-on-error: ${{ matrix.node-version == 20 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run tests
        run: yarn test --watchAll=false --runInBand

  build_on_mac:
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@master
      with:
        ref: master
    - uses: actions/setup-node@master
      with:
        node-version: 12.22.6
    - name: Install dependencies
      run: yarn install
    - name: Build binary
      run: yarn build-desktop
      continue-on-error: true
    - name: Look at what we've got
      run: ls -l ./dist-desktop
    - name: Look at what we've got num2
      run: ls -l ./dist-desktop/mac
    - uses: actions/upload-artifact@v2
      with:
        name: platform-build
        path: |
          dist-desktop/Lessons*Luke*.dmg
          dist-desktop/Lessons*Luke*.exe
