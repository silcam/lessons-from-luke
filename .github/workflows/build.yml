name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: yarn install --immutable
        env:
          NPM_CONFIG_UNSAFE_PERM: "true"
      - name: ESLint
        run: yarn lint
      - name: Prettier
        run: yarn format:check
      - name: TypeScript (core, server, desktop, frontend)
        run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    needs: static-checks
    container:
      image: node:24.15.0-bookworm
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lessons-from-luke
          POSTGRES_PASSWORD: lessons-from-luke
          POSTGRES_DB: lessons-from-luke
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y -qq postgresql-client zip
      - name: Create test database
        run: |
          PGPASSWORD=lessons-from-luke psql -h postgres -U lessons-from-luke -c \
            'CREATE DATABASE "lessons-from-luke-test" OWNER "lessons-from-luke";'
      - name: Generate secrets.json
        run: |
          cat > secrets.json << 'EOF'
          {
            "cookieSecret": "ci-test-cookie-secret-min-32-characters-long",
            "adminEmail": "admin@example.com",
            "adminPassword": "ci-test-password-1234",
            "db": {
              "host": "postgres",
              "database": "lessons-from-luke",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            },
            "testDb": {
              "host": "postgres",
              "database": "lessons-from-luke-test",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            }
          }
          EOF
      - name: Install dependencies
        run: yarn install --immutable
        env:
          NPM_CONFIG_UNSAFE_PERM: "true"
      - name: Run migrations
        run: yarn migrate:test
      - name: Run tests (random order x3)
        # libxmljs2 segfaults during GC finalization on exit (code 139) after all
        # tests pass. Treat 139 as success; real test failures exit with code 1.
        run: |
          for i in 1 2 3; do
            echo "--- Randomized run $i of 3 ---"
            set +e; yarn test:random; code=$?; set -e
            if [ $code -eq 139 ]; then echo "Note: segfault on exit (libxmljs2 known issue)"; continue; fi
            if [ $code -ne 0 ]; then exit $code; fi
          done

  integration:
    runs-on: ubuntu-latest
    needs: static-checks
    container:
      image: node:24.15.0-bookworm
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lessons-from-luke
          POSTGRES_PASSWORD: lessons-from-luke
          POSTGRES_DB: lessons-from-luke
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies (LibreOffice for `soffice --headless`, poppler-utils for `pdftotext`/`pdfinfo` in assembleQuarter.integration.test.ts)
        run: |
          apt-get update -qq
          apt-get install -y -qq postgresql-client zip libreoffice poppler-utils
      - name: Create test database
        run: |
          PGPASSWORD=lessons-from-luke psql -h postgres -U lessons-from-luke -c \
            'CREATE DATABASE "lessons-from-luke-test" OWNER "lessons-from-luke";'
      - name: Generate secrets.json
        run: |
          cat > secrets.json << 'EOF'
          {
            "cookieSecret": "ci-test-cookie-secret-min-32-characters-long",
            "adminEmail": "admin@example.com",
            "adminPassword": "ci-test-password-1234",
            "db": {
              "host": "postgres",
              "database": "lessons-from-luke",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            },
            "testDb": {
              "host": "postgres",
              "database": "lessons-from-luke-test",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            }
          }
          EOF
      - name: Install dependencies
        run: yarn install --immutable
        env:
          NPM_CONFIG_UNSAFE_PERM: "true"
      - name: Run migrations
        run: yarn migrate:test
      - name: Run integration tests
        # libxmljs2 can segfault on exit (code 139) after tests pass — same as
        # the unit suite. Treat 139 as success; real failures exit with 1.
        run: |
          set +e; yarn test:integration; code=$?; set -e
          if [ $code -eq 139 ]; then echo "Note: segfault on exit (libxmljs2 known issue)"; exit 0; fi
          exit $code

  e2e:
    runs-on: ubuntu-latest
    needs: static-checks
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lessons-from-luke
          POSTGRES_PASSWORD: lessons-from-luke
          POSTGRES_DB: lessons-from-luke
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
      - name: Create test database
        run: |
          PGPASSWORD=lessons-from-luke psql -h localhost -U lessons-from-luke -c \
            'CREATE DATABASE "lessons-from-luke-test" OWNER "lessons-from-luke";'
      - name: Generate secrets.json
        run: |
          cat > secrets.json << 'EOF'
          {
            "cookieSecret": "ci-test-cookie-secret-min-32-characters-long",
            "adminEmail": "admin@example.com",
            "adminPassword": "ci-test-password-1234",
            "db": {
              "host": "localhost",
              "database": "lessons-from-luke",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            },
            "testDb": {
              "host": "localhost",
              "database": "lessons-from-luke-test",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            }
          }
          EOF
      - name: Install dependencies
        run: yarn install --immutable
        env:
          NPM_CONFIG_UNSAFE_PERM: "true"
      - name: Build server
        run: npx tsc -b src/server
      - name: Run migrations
        run: yarn migrate:test
      - uses: cypress-io/github-action@v7
        with:
          install: false
          start: npx concurrently "yarn wpDevServerWeb" "yarn serve"
          # Wait for BOTH the webpack dev server (8080) and the API server (8081)
          # before running specs. /api/languages is public and DB-backed, so a 200
          # confirms the API process is up AND can reach Postgres — without it,
          # Cypress charges ahead the moment 8080 responds and every spec fails its
          # before-each with a proxy 504 if the API is still starting (or crashed).
          wait-on: "http://localhost:8080, http://localhost:8081/api/languages"
          wait-on-timeout: 180
          command: bash scripts/run-cypress-random.sh

  desktop-e2e:
    runs-on: ubuntu-latest
    needs: static-checks
    # Hard cap so a hung Electron/Xvfb session can't burn the default 360-min
    # job timeout. The suite itself runs in ~30s locally; 10min is generous.
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lessons-from-luke
          POSTGRES_PASSWORD: lessons-from-luke
          POSTGRES_DB: lessons-from-luke
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
      - name: Install system dependencies (Electron runtime + xvfb)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            postgresql-client \
            xvfb \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libgbm1 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxrandr2 libxfixes3 libxss1 libgtk-3-0 \
            libpango-1.0-0 libcairo2 libasound2t64
      - name: Allow unprivileged user namespaces (Electron Chromium sandbox)
        # Ubuntu 24 GitHub runners restrict unprivileged_userns by default, which
        # prevents Electron's Chromium sandbox from initializing and causes
        # `electron.launch` to fail with "Failed to move to new namespace". This
        # toggle matches the official electron/Playwright CI guidance.
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Create test database
        run: |
          PGPASSWORD=lessons-from-luke psql -h localhost -U lessons-from-luke -c \
            'CREATE DATABASE "lessons-from-luke-test" OWNER "lessons-from-luke";'
      - name: Generate secrets.json
        run: |
          cat > secrets.json << 'EOF'
          {
            "cookieSecret": "ci-test-cookie-secret-min-32-characters-long",
            "adminEmail": "admin@example.com",
            "adminPassword": "ci-test-password-1234",
            "db": {
              "host": "localhost",
              "database": "lessons-from-luke",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            },
            "testDb": {
              "host": "localhost",
              "database": "lessons-from-luke-test",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            }
          }
          EOF
      - name: Install dependencies
        run: yarn install --immutable
        env:
          NPM_CONFIG_UNSAFE_PERM: "true"
      # Playwright launches Electron from dist/desktop/main-test.js (flat layout).
      # That layout is only produced by the DEV tsconfig — the prod tsconfig nests
      # under dist/desktop/desktop/. See src/desktop/tsconfig.prod.json comments.
      - name: Build desktop main + server (dev tsconfig — flat dist/desktop/)
        run: npx tsc -b ./src/desktop ./src/server
      - name: Run migrations
        run: yarn migrate:test
      - name: Start webpack-dev-server (desktop) + API server in background
        run: |
          nohup yarn wpDevServerDesktop > /tmp/webpack-desktop.log 2>&1 &
          nohup yarn serve > /tmp/server.log 2>&1 &
      - name: Wait for services (api 8081, desktop renderer 8082)
        run: npx wait-on -t 180000 http://localhost:8081/api/languages http://localhost:8082/desktop.html
      - name: Run Playwright Electron tests under Xvfb
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" yarn test-desktop-e2e
      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-e2e-logs
          path: |
            /tmp/webpack-desktop.log
            /tmp/server.log

  e2e-prod-smoke:
    runs-on: ubuntu-latest
    needs: static-checks
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lessons-from-luke
          POSTGRES_PASSWORD: lessons-from-luke
          POSTGRES_DB: lessons-from-luke
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
      # No "Create test database" step: this job serves NODE_ENV=production, which
      # uses secrets.db ("lessons-from-luke") — already created by the postgres
      # service's POSTGRES_DB. The unused testDb block below just satisfies the
      # Secrets interface.
      - name: Generate secrets.json
        run: |
          cat > secrets.json << 'EOF'
          {
            "cookieSecret": "ci-test-cookie-secret-min-32-characters-long",
            "adminEmail": "admin@example.com",
            "adminPassword": "ci-test-password-1234",
            "db": {
              "host": "localhost",
              "database": "lessons-from-luke",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            },
            "testDb": {
              "host": "localhost",
              "database": "lessons-from-luke-test",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            },
            "email": {
              "apiKey": "ci-test-fake-mailgun-api-key",
              "domain": "mg.ci-test.example.com",
              "fromAddress": "noreply@mg.ci-test.example.com"
            }
          }
          EOF
      - name: Install dependencies
        run: yarn install --immutable
        env:
          NPM_CONFIG_UNSAFE_PERM: "true"
      # Prod bundle: tsc -b src/server/tsconfig.prod.json (nests the entry at
      # dist/server/server/server.js) AND webpack production (→ dist/frontend).
      # serve-prod runs the nested entry; the SPA shell is served from dist/frontend.
      - name: Build production server + web bundle
        run: yarn build-server
      # No flag → migrates the prod DB ("lessons-from-luke") and seeds the admin
      # user, so /api/auth/get-session resolves and PublicHome renders.
      - name: Run migrations (prod DB)
        run: yarn migrate
      - uses: cypress-io/github-action@v7
        with:
          install: false
          start: yarn serve-prod
          # serve-prod sets BETTER_AUTH_URL=https://localhost:8081 (to pass the
          # prod secrets guard) and NODE_ENV=production. "/" serves the SPA shell
          # without touching the DB, so a 200 means the HTTP server is up; the
          # spec's own commands then wait for the app to finish loading.
          wait-on: "http://localhost:8081"
          wait-on-timeout: 180
          command: npx cypress run --config-file cypress.prod.config.js

  build_on_mac:
    runs-on: macos-latest
    needs: [static-checks, test, integration, e2e, e2e-prod-smoke, desktop-e2e]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build binary
        run: yarn build-desktop
      - name: Look at what we've got
        run: ls -l ./dist-desktop
      - name: Look at what we've got num2
        run: ls -l ./dist-desktop/mac
      - uses: actions/upload-artifact@v7
        with:
          name: platform-build
          path: |
            dist-desktop/Lessons*Luke*.dmg
            dist-desktop/Lessons*Luke*.exe
