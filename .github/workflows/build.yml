name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: lessons-from-luke
          POSTGRES_PASSWORD: lessons-from-luke
          POSTGRES_DB: lessons-from-luke
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y -qq postgresql-client zip
      - name: Create test database
        run: |
          PGPASSWORD=lessons-from-luke psql -h postgres -U lessons-from-luke -c \
            'CREATE DATABASE "lessons-from-luke-test" OWNER "lessons-from-luke";'
      - name: Generate secrets.json
        run: |
          cat > secrets.json << 'EOF'
          {
            "cookieSecret": "ci-test-secret",
            "adminUsername": "admin",
            "adminPassword": "admin",
            "db": {
              "host": "postgres",
              "database": "lessons-from-luke",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            },
            "testDb": {
              "host": "postgres",
              "database": "lessons-from-luke-test",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            }
          }
          EOF
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          NPM_CONFIG_UNSAFE_PERM: "true"
      - name: Run migrations
        run: yarn migrate:test
      - name: Run tests (random order x3)
        # libxmljs2 segfaults during GC finalization on exit (code 139) after all
        # tests pass. Treat 139 as success; real test failures exit with code 1.
        run: |
          for i in 1 2 3; do
            echo "--- Randomized run $i of 3 ---"
            set +e; yarn test:random; code=$?; set -e
            if [ $code -eq 139 ]; then echo "Note: segfault on exit (libxmljs2 known issue)"; continue; fi
            if [ $code -ne 0 ]; then exit $code; fi
          done

  e2e:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: lessons-from-luke
          POSTGRES_PASSWORD: lessons-from-luke
          POSTGRES_DB: lessons-from-luke
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
      - name: Create test database
        run: |
          PGPASSWORD=lessons-from-luke psql -h localhost -U lessons-from-luke -c \
            'CREATE DATABASE "lessons-from-luke-test" OWNER "lessons-from-luke";'
      - name: Generate secrets.json
        run: |
          cat > secrets.json << 'EOF'
          {
            "cookieSecret": "ci-test-secret",
            "adminUsername": "chris",
            "adminPassword": "yo",
            "db": {
              "host": "localhost",
              "database": "lessons-from-luke",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            },
            "testDb": {
              "host": "localhost",
              "database": "lessons-from-luke-test",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            }
          }
          EOF
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          NPM_CONFIG_UNSAFE_PERM: "true"
      - name: Build server
        run: npx tsc -b src/server
      - name: Run migrations
        run: yarn migrate:test
      - uses: cypress-io/github-action@v6
        with:
          install: false
          start: npx concurrently "yarn wpDevServerWeb" "yarn serve"
          wait-on: http://localhost:8080
          wait-on-timeout: 180
          command: bash -c "for i in 1 2 3; do echo '--- Randomized run '$i' of 3 ---'; yarn cypress:run:random || exit 1; done"

  build_on_mac:
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@master
      with:
        ref: master
    - uses: actions/setup-node@master
      with:
        node-version: 24
    - name: Install dependencies
      run: yarn install
    - name: Build binary
      run: yarn build-desktop
      continue-on-error: true
    - name: Look at what we've got
      run: ls -l ./dist-desktop
    - name: Look at what we've got num2
      run: ls -l ./dist-desktop/mac
    - uses: actions/upload-artifact@v2
      with:
        name: platform-build
        path: |
          dist-desktop/Lessons*Luke*.dmg
          dist-desktop/Lessons*Luke*.exe
