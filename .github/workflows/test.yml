name: Test Suite

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# libxmljs2 segfaults during GC finalization on process teardown (exit 139).
# This only happens AFTER all tests complete — test failures exit with code 1
# during the run, not 139. So 139 == tests passed, process crashed on exit.
# The run_tests function below treats 139 as success for this reason.

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:12.22.12-bullseye

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends postgresql-client zip

      - name: Install dependencies
        run: yarn install
        env:
          NPM_CONFIG_UNSAFE_PERM: "true"

      - name: Set up PostgreSQL user and databases
        run: |
          PGPASSWORD=postgres psql -U postgres -h postgres -c "CREATE USER \"lessons-from-luke\" WITH PASSWORD 'lessons-from-luke';"
          PGPASSWORD=postgres psql -U postgres -h postgres -c "CREATE DATABASE \"lessons-from-luke\" OWNER \"lessons-from-luke\";"
          PGPASSWORD=postgres psql -U postgres -h postgres -c "CREATE DATABASE \"lessons-from-luke-test\" OWNER \"lessons-from-luke\";"

      - name: Create secrets.json
        run: |
          cat > secrets.json << 'EOF'
          {
            "cookieSecret": "test-secret",
            "adminUsername": "chris",
            "adminPassword": "yo",
            "db": {
              "host": "postgres",
              "database": "lessons-from-luke",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            },
            "testDb": {
              "host": "postgres",
              "database": "lessons-from-luke-test",
              "username": "lessons-from-luke",
              "password": "lessons-from-luke"
            }
          }
          EOF

      - name: Run migrations (test DB)
        run: TEST_DB=true npx migrate up
        env:
          NODE_ENV: test

      - name: Run tests (default order)
        run: |
          set +e; yarn test:once; code=$?; set -e
          if [ $code -eq 139 ]; then echo "Note: segfault on exit (libxmljs2 known issue)"; exit 0; fi
          exit $code
        env:
          NODE_ENV: test

      - name: Run tests (reverse order)
        run: |
          set +e; yarn test:reverse; code=$?; set -e
          if [ $code -eq 139 ]; then echo "Note: segfault on exit (libxmljs2 known issue)"; exit 0; fi
          exit $code
        env:
          NODE_ENV: test

      - name: Run tests (random order x3)
        run: |
          for i in 1 2 3; do
            echo "--- Randomized run $i of 3 ---"
            set +e; yarn test:random; code=$?; set -e
            if [ $code -eq 139 ]; then echo "Note: segfault on exit (libxmljs2 known issue)"; continue; fi
            if [ $code -ne 0 ]; then exit $code; fi
          done
        env:
          NODE_ENV: test
