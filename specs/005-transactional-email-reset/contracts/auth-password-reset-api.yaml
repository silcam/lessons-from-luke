openapi: 3.0.3
info:
  title: Self-Service Password Reset API (better-auth built-in endpoints)
  version: 1.0.0
  description: >
    These endpoints are provided by better-auth and mounted under
    `/api/auth/*` via `toNodeHandler(getAuth())` in serverApp.ts. This feature
    does NOT hand-write them; it wires the `sendResetPassword`,
    `onPasswordReset`, and `revokeSessionsOnPasswordReset` options in getAuth()
    and adds rate-limit customRules. The browser calls them through the
    better-auth client (authClient.requestPasswordReset / authClient.resetPassword).
    Documented here as the behavioral contract the acceptance tests assert on.

paths:
  /api/auth/request-password-reset:
    post:
      summary: Request a password-reset link (enumeration-safe)
      description: >
        Always returns the SAME generic 200 body whether or not an account
        exists for the email (FR-007, SC-004 — verified enumeration-safe in
        better-auth source). When (and only when) an account exists, a
        single-use, time-limited reset link is emailed via sendResetPassword.
        Send failures are swallowed, so the generic 200 is returned regardless
        (FR-013). Rate-limited per-IP via customRules `{ window: 60, max: 3 }`.

        PER-ADDRESS THROTTLE (red-team Pass 3): the per-IP customRule alone does
        NOT bound repeated requests for a single ADDRESS (customRules are keyed by
        path + IP), so FR-012 and the spec "Reset request flooding" edge case are
        only half met — an IP-rotating attacker is able to flood a known account
        holder's inbox. A per-address throttle (reusing the same manual
        rateLimit-table check pattern as the per-invitation resend throttle) is
        applied INSIDE sendResetPassword (which runs only for existing accounts). An
        over-limit address SUPPRESSES the send but still returns this same generic
        200 — enumeration- and timing-safe because the check rides the
        already-backgrounded send path. See data-model.md (rateLimit). If instead
        the team accepts per-IP-only scope, that decision must be explicitly recorded
        rather than left implicit.

        PER-ADDRESS KEY — NORMALIZATION + KEYED HASH (red-team Pass 8): the throttle
        key MUST be reset-req:<HMAC-SHA256(serverSecret, canonicalEmail)>, NOT the
        cleartext address. (1) The canonical normalization MUST match better-auth's
        own account-lookup normalization, or case/dot variants of one address hit
        different counters and the throttle — plus the Pass-5 supersession coupling
        that depends on it firing — is bypassable (re-opening flooding +
        denial-of-reset). (2) The key must be a keyed hash because the check runs
        only for accounts that exist, so a cleartext-email row would turn the shared
        rateLimit table into an at-rest account-existence oracle, re-introducing the
        enumeration this endpoint closes at the response layer. See data-model.md
        (rateLimit).

        TIMING-SAFE (red-team Pass 2): the body alone is not enough — awaiting the
        send would make a known-account response measurably slower than an
        unknown-email response (which short-circuits), re-opening enumeration via
        a timing oracle. sendResetPassword therefore dispatches transport.send as
        a FIRE-AND-FORGET background task (not awaited by the request handler), so
        the response time does not depend on account existence or on Mailgun
        latency. The bounded send timeout and the redaction-aware failure log
        still apply in the background.

        TIMING-SAFE — ALL ACCOUNT-CONDITIONAL WORK BACKGROUNDED (red-team Pass 6):
        the per-address throttle check, the supersession decision, and the
        suppressed-row cleanup added by Pass 5 are also DB round-trips that run
        ONLY for existing accounts. They MUST live in the SAME background task as
        the send — sendResetPassword must return effectively immediately and do no
        awaited DB work in its synchronous body — otherwise that account-conditional
        DB latency re-opens the timing oracle (a smaller, local-DB delta) that Pass 2
        closed for the send. The integration timing assertion must hold with the
        throttle + supersession logic active, not just the bare send.

        TIMING-SAFE — RESIDUAL FLOOR IS better-auth'S OWN PRE-CALLBACK INSERT
        (red-team Pass 11): the Pass-2/Pass-6 backgrounding governs only OUR work.
        better-auth's handler (dist/api/routes/password.mjs, ^1.6.14) does
        account-conditional synchronous DB work BEFORE it calls sendResetPassword:
        a known account runs createVerificationValue (an INSERT of the
        reset-password token row); an unknown email runs a dummy
        findVerificationValue (a SELECT) as better-auth's own timing simulation.
        That INSERT-vs-SELECT delta is upstream of our callback and cannot be
        removed by our code, so the timing-parity assertion MUST be a tolerance /
        "does not materially differ" check sized above this floor — never strict
        equality. Our Pass-6 obligation is therefore scoped to "add no FURTHER
        account-conditional awaited work in sendResetPassword's synchronous body,"
        relying on better-auth's dummy-SELECT simulation for the rest of the
        parity. See data-model.md (verification, residual timing floor).

        SUPERSESSION (red-team Pass 2): issuing a new reset link invalidates any
        prior un-consumed reset-password token for the same account, so an older
        still-unused link stops working (spec §Edge Cases "Superseded reset
        link"). If better-auth does not do this by default, sendResetPassword
        enforces it by invalidating the user's existing reset-password verification
        rows before/while issuing the new token. See the SUPERSEDED transition in
        data-model.md.

        SUPERSESSION COUPLED TO ACTUAL SEND (red-team Pass 5): supersession MUST be
        coupled to an actual send, not to a mere request — otherwise the Pass 3
        per-address throttle (which suppresses the EMAIL but does not stop token
        generation) lets an IP-rotating attacker who knows a victim's address
        repeatedly supersede the victim's own live reset link without ever sending
        mail, an indefinite remote DENIAL-OF-RESET that defeats SC-001/FR-005. So:
        evaluate the per-address throttle FIRST; when over-limit (send suppressed),
        do NOT invalidate the user's prior un-consumed reset-password rows and
        DELETE the just-written new verification row — only a request that actually
        emails a new link may supersede the prior one. The victim's live link
        survives. Supersession must also be an INVARIANT, not a racy best-effort
        delete (concurrent legitimate requests must not leave two live tokens):
        enforce most-recent-only at /reset-password validation time, or do the
        invalidate+issue atomically. See data-model.md (verification, rateLimit).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                redirectTo:
                  type: string
                  description: >
                    Optional SPA path the link should target. UNTRUSTED for link
                    construction (red-team Pass 1): this feature ALWAYS builds the
                    emitted link server-side as
                    ${getWebAppBaseUrl()}/reset-password?token=${encodeURIComponent(token)},
                    ignoring both this `redirectTo` and the `url` arg better-auth
                    passes to sendResetPassword. This prevents a caller-supplied
                    value from poisoning the reset-link origin (open-redirect /
                    phishing). redirectTo is therefore not required and has no
                    effect on our flow.
      responses:
        "200":
          description: Generic confirmation (identical for known/unknown email)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean, example: true }
                  message:
                    type: string
                    example: "If this email exists in our system, check your email for the reset link"
        "429":
          description: Too many reset requests from this origin (FR-012)

  /api/auth/reset-password:
    post:
      summary: Set a new password using a valid reset token
      description: >
        Validates newPassword against the existing policy (12..128 chars,
        FR-008), updates the credential, deletes the reset token (single-use,
        FR-010/SC-006), revokes all of the account's sessions
        (revokeSessionsOnPasswordReset, FR-009/SC-005), and fires onPasswordReset
        (best-effort "password changed" email, D7). Rate-limited per-IP via
        customRules `{ window: 60, max: 5 }`.

        CONFIRMATION-EMAIL ISOLATION (red-team Pass 4): the onPasswordReset
        "password changed" notice is the THIRD email send site (after the
        backgrounded reset-request send and the awaited invitation send). It runs
        inside this handler AFTER the password is already changed and sessions are
        already revoked, so it MUST be self-catching and dispatched OFF the awaited
        response path (fire-and-forget with the redaction-aware .catch, like the
        Pass-2 reset send). A slow/hung or throwing confirmation transport therefore
        never delays this 200 and never turns a successful reset into a 4xx/5xx that
        contradicts the actual account state. See plan.md Security Considerations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword, token]
              properties:
                newPassword:
                  type: string
                  minLength: 12
                  maxLength: 128
                token:
                  type: string
      responses:
        "200":
          description: Password updated; account can sign in with the new password
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean, example: true }
        "400":
          description: >
            INVALID_TOKEN (used/expired/unknown/SUPERSEDED token — FR-010, and
            spec §Edge Cases "Superseded reset link", red-team Pass 2) OR
            PASSWORD_TOO_SHORT / PASSWORD_TOO_LONG (policy violation — FR-008,
            password unchanged)
        "429":
          description: Too many reset attempts (token-guessing defense-in-depth)
