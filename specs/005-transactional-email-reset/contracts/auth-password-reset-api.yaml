openapi: 3.0.3
info:
  title: Self-Service Password Reset API (better-auth built-in endpoints)
  version: 1.0.0
  description: >
    These endpoints are provided by better-auth and mounted under
    `/api/auth/*` via `toNodeHandler(getAuth())` in serverApp.ts. This feature
    does NOT hand-write them; it wires the `sendResetPassword`,
    `onPasswordReset`, and `revokeSessionsOnPasswordReset` options in getAuth()
    and adds rate-limit customRules. The browser calls them through the
    better-auth client (authClient.requestPasswordReset / authClient.resetPassword).
    Documented here as the behavioral contract the acceptance tests assert on.

paths:
  /api/auth/request-password-reset:
    post:
      summary: Request a password-reset link (enumeration-safe)
      description: >
        Always returns the SAME generic 200 body whether or not an account
        exists for the email (FR-007, SC-004 — verified enumeration-safe in
        better-auth source). When (and only when) an account exists, a
        single-use, time-limited reset link is emailed via sendResetPassword.
        Send failures are swallowed, so the generic 200 is returned regardless
        (FR-013). Rate-limited per-IP via customRules `{ window: 60, max: 3 }`.

        PER-ADDRESS THROTTLE (red-team Pass 3): the per-IP customRule alone does
        NOT bound repeated requests for a single ADDRESS (customRules are keyed by
        path + IP), so FR-012 and the spec "Reset request flooding" edge case are
        only half met — an IP-rotating attacker is able to flood a known account
        holder's inbox. A per-address throttle (synthetic key reset-req:<normalized
        email>, reusing the same manual rateLimit-table check pattern as the
        per-invitation resend throttle) is applied INSIDE sendResetPassword (which
        runs only for existing accounts). An over-limit address SUPPRESSES the send
        but still returns this same generic 200 — enumeration- and timing-safe
        because the check rides the already-backgrounded send path. See
        data-model.md (rateLimit). If instead the team accepts per-IP-only scope,
        that decision must be explicitly recorded rather than left implicit.

        TIMING-SAFE (red-team Pass 2): the body alone is not enough — awaiting the
        send would make a known-account response measurably slower than an
        unknown-email response (which short-circuits), re-opening enumeration via
        a timing oracle. sendResetPassword therefore dispatches transport.send as
        a FIRE-AND-FORGET background task (not awaited by the request handler), so
        the response time does not depend on account existence or on Mailgun
        latency. The bounded send timeout and the redaction-aware failure log
        still apply in the background.

        SUPERSESSION (red-team Pass 2): issuing a new reset link invalidates any
        prior un-consumed reset-password token for the same account, so an older
        still-unused link stops working (spec §Edge Cases "Superseded reset
        link"). If better-auth does not do this by default, sendResetPassword
        enforces it by invalidating the user's existing reset-password verification
        rows before/while issuing the new token. See the SUPERSEDED transition in
        data-model.md.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                redirectTo:
                  type: string
                  description: >
                    Optional SPA path the link should target. UNTRUSTED for link
                    construction (red-team Pass 1): this feature ALWAYS builds the
                    emitted link server-side as
                    ${getWebAppBaseUrl()}/reset-password?token=${encodeURIComponent(token)},
                    ignoring both this `redirectTo` and the `url` arg better-auth
                    passes to sendResetPassword. This prevents a caller-supplied
                    value from poisoning the reset-link origin (open-redirect /
                    phishing). redirectTo is therefore not required and has no
                    effect on our flow.
      responses:
        "200":
          description: Generic confirmation (identical for known/unknown email)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean, example: true }
                  message:
                    type: string
                    example: "If this email exists in our system, check your email for the reset link"
        "429":
          description: Too many reset requests from this origin (FR-012)

  /api/auth/reset-password:
    post:
      summary: Set a new password using a valid reset token
      description: >
        Validates newPassword against the existing policy (12..128 chars,
        FR-008), updates the credential, deletes the reset token (single-use,
        FR-010/SC-006), revokes all of the account's sessions
        (revokeSessionsOnPasswordReset, FR-009/SC-005), and fires onPasswordReset
        (best-effort "password changed" email, D7). Rate-limited per-IP via
        customRules `{ window: 60, max: 5 }`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword, token]
              properties:
                newPassword:
                  type: string
                  minLength: 12
                  maxLength: 128
                token:
                  type: string
      responses:
        "200":
          description: Password updated; account can sign in with the new password
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean, example: true }
        "400":
          description: >
            INVALID_TOKEN (used/expired/unknown/SUPERSEDED token — FR-010, and
            spec §Edge Cases "Superseded reset link", red-team Pass 2) OR
            PASSWORD_TOO_SHORT / PASSWORD_TOO_LONG (policy violation — FR-008,
            password unchanged)
        "429":
          description: Too many reset attempts (token-guessing defense-in-depth)
